aid: sportsbook-api
name: Sportsbook API
description: >-
  Sportsbook API provides real-time sports betting odds data from major US sportsbooks
  including FanDuel, DraftKings, BetMGM, Kalshi, theScore, Fanatics, BetRivers,
  Polymarket, Bovada, and BetOnline. The API aggregates spreads, moneylines, totals,
  halves, quarters, player props, and futures for NFL, NBA, MLB, NHL, NCAA football,
  NCAA basketball, and soccer leagues. Includes tools to identify positive expected
  value (+EV) bets, arbitrage opportunities, and middling situations. Odds update
  once per minute, with live odds available during games.
